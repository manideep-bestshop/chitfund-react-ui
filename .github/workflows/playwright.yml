name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    # 1. Setup Backend (.NET)
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
    
    - name: Restore and Build Backend
      run: |
        dotnet restore backend/ChitFund.API/ChitFund.API.csproj
        dotnet build backend/ChitFund.API/ChitFund.API.csproj --configuration Release

    # 2. Setup Frontend (Node/React)
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install Frontend Dependencies
      run: npm ci
      working-directory: frontend

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
      working-directory: frontend

    # 3. Run Everything
    - name: Run Playwright tests
      run: |
        # Start Backend in background (using the safe port 5050)
        dotnet run --project backend/ChitFund.API/ChitFund.API.csproj --configuration Release & 
        # Run Playwright tests
        npx playwright test
      working-directory: frontend
      env:
        ASPNETCORE_URLS: http://localhost:5050
        REACT_APP_API_URL: http://localhost:5050

    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: frontend/playwright-report/
        retention-days: 30